backend:
  name: git-gateway
  branch: main

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

site_url: "/"
display_url: "/"

collections:
  - name: "packages"
    label: "Tour Packages"
    label_singular: "Package"
    format: "json"
    file: "content/data/packages.json"
    editor:
      preview: false
    fields:
      - label: "Packages"
        name: "packages"
        widget: "list"
        summary: "{{fields.title}} ({{fields.duration}})"
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Badge", name: "badge", widget: "string", required: false }
          - { label: "Starting From (number only)", name: "startingFrom", widget: "number", value_type: "int" }
          - { label: "Currency", name: "currency", widget: "string", default: "LKR" }
          - { label: "Duration", name: "duration", widget: "string" }
          - { label: "Category", name: "category", widget: "select", options: ["Family","Honeymoon","Relaxing","Adventure","Solo","Budget","Luxury"], default: "Family" }
          - { label: "Destinations", name: "destinations", widget: "list", allow_add: true }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Highlights", name: "highlights", widget: "list", allow_add: true, required: false }
          - { label: "Inclusions", name: "inclusions", widget: "list", allow_add: true, required: false }
          - { label: "Exclusions", name: "exclusions", widget: "list", allow_add: true, required: false }
          - label: "Itinerary"
            name: "itinerary"
            widget: "list"
            required: false
            fields:
              - { label: "Day", name: "day", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Details", name: "details", widget: "text" }
          - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "faqs"
    label: "FAQs"
    format: "json"
    file: "content/data/faqs.json"
    editor:
      preview: false
    fields:
      - label: "FAQ Items"
        name: "faqs"
        widget: "list"
        summary: "{{fields.q}}"
        fields:
          - { label: "Question", name: "q", widget: "string" }
          - { label: "Answer", name: "a", widget: "text" }

  - name: "success_stories"
    label: "Success Stories"
    format: "json"
    file: "content/data/success-stories.json"
    editor:
      preview: false
    fields:
      - label: "Stories"
        name: "stories"
        widget: "list"
        summary: "{{fields.country}} — {{fields.title}}"
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Country", name: "country", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Customer Name", name: "name", widget: "string", required: false }
          - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
          - { label: "Rating (1-5)", name: "rating", widget: "number", min: 1, max: 5, value_type: "int" }
          - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
          - { label: "Gallery Count", name: "galleryCount", widget: "number", value_type: "int", required: false }
          - { label: "Excerpt", name: "excerpt", widget: "text" }

  - name: "news"
    label: "News & Trends"
    format: "json"
    file: "content/data/news.json"
    editor:
      preview: false
    fields:
      - label: "News Posts"
        name: "news"
        widget: "list"
        summary: "{{fields.date}} — {{fields.title}}"
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
          - { label: "Image", name: "image", widget: "image", required: false }
          - { label: "Excerpt", name: "excerpt", widget: "text" }

  - name: "site"
    label: "Site Settings"
    format: "json"
    file: "content/data/site.json"
    editor:
      preview: false
    fields:
      - { label: "Company Name", name: "companyName", widget: "string" }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - label: "Contact"
        name: "contact"
        widget: "object"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string", required: false }
          - { label: "Address", name: "address", widget: "string", required: false }
      - { label: "Unique Selling Proposition", name: "usp", widget: "text" }
      - { label: "Response Time Goal (hours)", name: "responseTimeGoalHours", widget: "string" }
      - { label: "Privacy Policy", name: "privacyPolicy", widget: "text" }
      - { label: "Green Promise", name: "greenPromise", widget: "text", required: false }
