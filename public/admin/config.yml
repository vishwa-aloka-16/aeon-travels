# ══════════════════════════════════════════════════════════════════════
#  AEON TRAVELS & TOURS — Decap CMS Configuration
#  Save this file to:  public/admin/config.yml
#
#  File structure reference (from your VS Code explorer):
#    public/
#      admin/
#        config.yml          ← THIS FILE
#        index.html          ← Decap CMS admin UI entry point
#      assets/
#        css/                ← output.css, reviews.css etc.
#        fonts/
#        icons/
#        images/             ← logo-flower-aeon.png, Home_Image.jpg etc.
#        js/
#      data/
#        packages.json       ← All tour packages (all sections)
#        reviews.json        ← Customer reviews + platform stats
#        site.json           ← Global site settings
#      partials/
#      about.html
#      contact.html
#      index.html
#      reviews.html
#      tour-detail.html
#      tours-packages.html
#
#  Collections managed by this CMS:
#    1. ✈️  Tour Packages  →  public/data/packages.json
#    2. ⭐  Reviews        →  public/data/reviews.json
#    3. ⚙️  Site Settings  →  public/data/site.json
# ══════════════════════════════════════════════════════════════════════

backend:
  name: git-gateway
  branch: main

# ── Media uploads ──────────────────────────────────────────────────
# Uploaded images are saved to public/assets/uploads/
# and referenced in HTML/JSON as /assets/uploads/filename.jpg
media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

site_url: "/"
display_url: "/"

# ══════════════════════════════════════════════════════════════════════
collections:

  # ════════════════════════════════════════════════════════════════════
  #  1.  ✈️  TOUR PACKAGES
  #      File: public/data/packages.json
  #
  #  JSON structure:
  #    {
  #      "sections": [
  #        {
  #          "id": "tailor-made",
  #          "labelBold": "Tailor",
  #          "labelLight": "Made Tours",
  #          "packages": [ { ...package fields... } ]
  #        }
  #      ]
  #    }
  #
  #  The HTML pages fetch this file as:
  #    tours-packages.html  →  fetch("data/packages.json")
  #    tour-detail.html     →  fetch("data/packages.json")
  # ════════════════════════════════════════════════════════════════════
  - name: "packages"
    label: "✈️  Tour Packages"
    label_singular: "Package"
    description: >
      Manage all tour packages shown on the Holidays & Tours page and
      individual Tour Detail pages. Packages are grouped into Sections.
      Expand a section, then expand a package to edit it.
      ⚠️ Never change a Package ID or Section ID after the site is live
      — they are used in page URLs and internal links.
    format: "json"
    files:

      - name: "all_packages"
        label: "✈️  All Tour Packages  (public/data/packages.json)"
        file: "public/data/packages.json"
        fields:

          - label: "Sections"
            name: "sections"
            widget: "list"
            collapsed: false
            add_to_top: false
            summary: "📂  {{fields.labelBold}} {{fields.labelLight}}  —  id: {{fields.id}}"
            fields:

              # ── Section metadata ────────────────────────────────
              - label: "Section ID"
                name: "id"
                widget: "string"
                hint: >
                  Lowercase, hyphens only. E.g. «tailor-made», «fixed-departures», «getaways».
                  ⚠️ Do NOT change once live.

              - label: "Section Heading — Bold word(s)"
                name: "labelBold"
                widget: "string"
                hint: "Displayed in bold on the page. E.g. «Tailor»."

              - label: "Section Heading — Light word(s)"
                name: "labelLight"
                widget: "string"
                hint: "Displayed after the bold word in regular weight. E.g. «Made Tours»."

              # ── Packages inside this section ────────────────────
              - label: "Packages in this section"
                name: "packages"
                widget: "list"
                collapsed: true
                add_to_top: false
                summary: "🗺️  [{{fields.id}}]  {{fields.title}}  —  {{fields.destination}}  —  {{fields.startingFrom}}  —  {{fields.duration}}"
                fields:

                  # ── Core identity ──────────────────────────────
                  - label: "Package ID"
                    name: "id"
                    widget: "string"
                    hint: >
                      Unique across ALL packages. Format: pkg-001, pkg-002 …
                      Used in URLs: tour-detail.html?id=pkg-001
                      ⚠️ Do NOT change after the site is live.

                  - label: "Package Title"
                    name: "title"
                    widget: "string"
                    hint: "Full title on the card and detail page. E.g. «10 Days – Sri Lanka Dream Route»."

                  - label: "Destination Country"
                    name: "destination"
                    widget: "select"
                    options:
                      - "Sri Lanka"
                      - "Maldives"
                      - "Vietnam"
                      - "Cambodia"
                      - "Indonesia"
                      - "Dubai"
                      - "Singapore"
                      - "Malaysia"
                      - "Thailand"
                      - "Singapore & Malaysia"
                    hint: "Used for filter chips, flag icon and breadcrumbs."

                  - label: "Tour Type (tag shown on the card)"
                    name: "type"
                    widget: "select"
                    options:
                      - "Tailor Made"
                      - "Fixed Departure"
                      - "Getaway"

                  - label: "Suitable For"
                    name: "suitableFor"
                    widget: "select"
                    options:
                      - "Everyone"
                      - "Family"
                      - "Couple"
                      - "Honeymoon"
                      - "Solo"
                      - "Friends"
                      - "Group"

                  - label: "Duration"
                    name: "duration"
                    widget: "string"
                    hint: "E.g. «10 Days 9 Nights»."

                  - label: "Starting Price — must begin with LKR"
                    name: "startingFrom"
                    widget: "string"
                    hint: >
                      Format EXACTLY as «LKR 463,500».
                      The frontend strips non-numeric characters for
                      USD / EUR / GBP conversion — always use LKR.
                    pattern:
                      - "^LKR [\\d,]+"
                      - "Must start with «LKR » followed by digits e.g. LKR 463,500"

                  - label: "Featured (show highlight badge on card)?"
                    name: "featured"
                    widget: "boolean"
                    default: false

                  # ── Cities ──────────────────────────────────────
                  - label: "Number of Cities visited"
                    name: "numberOfCities"
                    widget: "number"
                    value_type: "int"
                    min: 1

                  - label: "Cities visited (comma-separated)"
                    name: "cities"
                    widget: "string"
                    hint: "E.g. «Colombo, Kandy, Ella, Mirissa». Used for the map and city chips."

                  # ── Themes ──────────────────────────────────────
                  - label: "Tour Themes (select all that apply)"
                    name: "themes"
                    widget: "select"
                    multiple: true
                    options:
                      - "Adventure"
                      - "Beach"
                      - "Culture"
                      - "Family"
                      - "History"
                      - "Honeymoon"
                      - "Luxury"
                      - "Nature"
                      - "Shopping"
                      - "Wellness"
                    hint: "Shown as theme chips on the detail page."

                  # ── Summary ─────────────────────────────────────
                  - label: "Tour Summary"
                    name: "summary"
                    widget: "text"
                    hint: "2–3 paragraph description. Plain text only — no HTML."

                  # ── Images ──────────────────────────────────────
                  - label: "Card / Hero Image"
                    name: "image"
                    widget: "image"
                    hint: "Main image on the package card and top of the detail page."

                  - label: "Card Image Alt Text (for accessibility)"
                    name: "imageAlt"
                    widget: "string"
                    hint: "Describe the image. E.g. «Nine Arch Bridge Ella at sunrise»."

                  - label: "Gallery Images (slider on detail page — 3 to 6 images)"
                    name: "galleryImages"
                    widget: "list"
                    collapsed: true
                    summary: "📷  {{fields.caption}}"
                    hint: "First image shows first in the slider."
                    fields:
                      - label: "Image"
                        name: "url"
                        widget: "image"
                      - label: "Caption"
                        name: "caption"
                        widget: "string"

                  # ── Inclusions / Exclusions / Conditions ────────
                  - label: "Short Inclusions (on card + summary card — 3 to 5 items)"
                    name: "inclusions"
                    widget: "list"
                    collapsed: true
                    hint: "E.g. «Private Driver/Guide», «Airport Assistance»."
                    field:
                      label: "Item"
                      name: "item"
                      widget: "string"

                  - label: "Full Inclusions List (Inclusions tab on detail page)"
                    name: "inclusions_full"
                    widget: "list"
                    collapsed: true
                    field:
                      label: "Inclusion"
                      name: "item"
                      widget: "string"

                  - label: "Exclusions (Exclusions tab on detail page)"
                    name: "exclusions"
                    widget: "list"
                    collapsed: true
                    hint: "E.g. «International airfare», «Visa fees»."
                    field:
                      label: "Exclusion"
                      name: "item"
                      widget: "string"

                  - label: "Booking Conditions (Conditions tab on detail page)"
                    name: "conditions"
                    widget: "list"
                    collapsed: true
                    hint: "E.g. «Prices are per person based on double occupancy»."
                    field:
                      label: "Condition"
                      name: "item"
                      widget: "string"

                  # ════════════════════════════════════════════════
                  #  DAY-BY-DAY ITINERARY
                  # ════════════════════════════════════════════════
                  - label: "Day-by-Day Itinerary"
                    name: "itinerary"
                    widget: "list"
                    collapsed: true
                    add_to_top: false
                    summary: "📅  Day {{fields.day}} — {{fields.city}}  |  🏨 {{fields.hotel}}  |  🍽️ {{fields.meals}}"
                    hint: >
                      One entry per day. Days display as an accordion on the
                      detail page in the order they appear here.
                    fields:

                      - label: "Day Number (e.g. 1, 2, 3)"
                        name: "day"
                        widget: "number"
                        value_type: "int"
                        min: 1

                      - label: "City / Location (shown as accordion heading)"
                        name: "city"
                        widget: "string"
                        hint: "E.g. «Colombo», «Ha Long Bay», «North Malé Atoll»."

                      - label: "Day Description (1–2 paragraphs)"
                        name: "description"
                        widget: "text"
                        hint: "Narrative for the day. Shown inside the accordion body."

                      - label: "Activities (bullet list — 4 to 6 items)"
                        name: "activities"
                        widget: "list"
                        collapsed: true
                        hint: "Short lines. E.g. «Visit Temple of the Tooth Relic»."
                        field:
                          label: "Activity"
                          name: "item"
                          widget: "string"

                      - label: "Highlight Photos (2-up photo grid — add exactly 2)"
                        name: "highlights"
                        widget: "list"
                        collapsed: true
                        summary: "🖼️  {{fields.caption}}"
                        hint: "Optional. Shown as a 2-column photo grid below the description."
                        fields:
                          - label: "Photo"
                            name: "url"
                            widget: "image"
                          - label: "Caption"
                            name: "caption"
                            widget: "string"

                      - label: "Hotel Name & Star Rating"
                        name: "hotel"
                        widget: "string"
                        hint: "E.g. «Cinnamon Grand (5 ★ Hotel)»."

                      - label: "Meals Included Today"
                        name: "meals"
                        widget: "select"
                        default: "N/A"
                        options:
                          - "N/A"
                          - "Breakfast"
                          - "Lunch"
                          - "Dinner"
                          - "Breakfast & Lunch"
                          - "Breakfast & Dinner"
                          - "Full Board"
                          - "Welcome Dinner"

                      - label: "Travel Time"
                        name: "travelTime"
                        widget: "string"
                        hint: "E.g. «Colombo to Kandy – 3 hours»."

                      - label: "Transport Type"
                        name: "transport"
                        widget: "select"
                        options:
                          - "Private Vehicle (Air Conditioned)"
                          - "Luxury Private Vehicle"
                          - "Scenic Train Journey"
                          - "Private Speedboat"
                          - "Domestic Flight"
                          - "Tuk Tuk"
                          - "N/A"

                  # ════════════════════════════════════════════════
                  #  PER-PACKAGE REVIEWS
                  #  Shown in the "People Say" section on tour-detail.html
                  # ════════════════════════════════════════════════
                  - label: "Package Reviews (shown on this tour's detail page)"
                    name: "reviews"
                    widget: "list"
                    collapsed: true
                    summary: "⭐{{fields.rating}}  {{fields.name}}  —  {{fields.platform}}  ({{fields.date}})"
                    hint: >
                      Add 1–3 reviews specific to THIS tour package.
                      For the global Success Stories page use the
                      «⭐ Customer Reviews» collection instead.
                    fields:

                      - label: "Reviewer Full Name"
                        name: "name"
                        widget: "string"

                      - label: "Reviewer Location"
                        name: "location"
                        widget: "string"
                        hint: "E.g. «United Kingdom», «Sydney, Australia»."

                      - label: "Review Date"
                        name: "date"
                        widget: "datetime"
                        format: "YYYY-MM-DD"
                        time_format: false

                      - label: "Star Rating"
                        name: "rating"
                        widget: "select"
                        default: "5"
                        options: ["1", "2", "3", "4", "5"]

                      - label: "Platform"
                        name: "platform"
                        widget: "select"
                        options:
                          - "TripAdvisor"
                          - "Google"
                          - "Facebook"

                      - label: "Review Text"
                        name: "text"
                        widget: "text"
                        hint: "Reviews over ~200 characters get a «See More» button automatically."

                      - label: "Avatar Initial (single capital letter)"
                        name: "avatar"
                        widget: "string"
                        hint: "First letter of the reviewer's name. E.g. «S» for Sarah."
                        pattern:
                          - "^[A-Z]$"
                          - "Must be exactly one uppercase letter."

                  # ── Related Packages ────────────────────────────
                  - label: "Related Package IDs (Related Tours section at page bottom)"
                    name: "relatedPackages"
                    widget: "list"
                    collapsed: true
                    hint: >
                      2–4 package IDs that will appear as «Related Tours» cards.
                      Must match existing package IDs exactly, e.g. «pkg-002».
                    field:
                      label: "Package ID"
                      name: "item"
                      widget: "string"


  # ════════════════════════════════════════════════════════════════════
  #  2.  ⭐  CUSTOMER REVIEWS
  #      File: public/data/reviews.json
  #
  #  JSON structure:
  #    {
  #      "stats": {
  #        "tripadvisor": { "count": 1306, "rating": 4.9 },
  #        "google":      { "count": 1068, "rating": 4.8 },
  #        "facebook":    { "count": 280,  "rating": 5.0 }
  #      },
  #      "reviews": [ { ...review fields... } ]
  #    }
  #
  #  The HTML pages fetch this as:
  #    reviews.html  →  fetch("data/reviews.json")
  # ════════════════════════════════════════════════════════════════════
  - name: "reviews"
    label: "⭐  Customer Reviews"
    label_singular: "Review"
    description: >
      Manage the global Success Stories page (reviews.html).
      Update platform stats when your TripAdvisor / Google / Facebook
      counts change. Add new reviews at the top of the list.
      Mark up to 5 reviews as Featured — they appear in the
      highlighted strip at the top of the page.
    format: "json"
    files:

      - name: "all_reviews"
        label: "⭐  Reviews + Platform Stats  (public/data/reviews.json)"
        file: "public/data/reviews.json"
        fields:

          # ── Platform stats ────────────────────────────────────────
          - label: "📊  Platform Statistics"
            name: "stats"
            widget: "object"
            collapsed: false
            hint: "Update these numbers manually when your review counts change on each platform."
            fields:

              - label: "TripAdvisor"
                name: "tripadvisor"
                widget: "object"
                fields:
                  - label: "Total Review Count"
                    name: "count"
                    widget: "number"
                    value_type: "int"
                    hint: "E.g. 1306"
                  - label: "Average Rating"
                    name: "rating"
                    widget: "number"
                    value_type: "float"
                    min: 1.0
                    max: 5.0
                    step: 0.1
                    hint: "E.g. 4.9"

              - label: "Google"
                name: "google"
                widget: "object"
                fields:
                  - label: "Total Review Count"
                    name: "count"
                    widget: "number"
                    value_type: "int"
                  - label: "Average Rating"
                    name: "rating"
                    widget: "number"
                    value_type: "float"
                    min: 1.0
                    max: 5.0
                    step: 0.1

              - label: "Facebook"
                name: "facebook"
                widget: "object"
                fields:
                  - label: "Total Review Count"
                    name: "count"
                    widget: "number"
                    value_type: "int"
                  - label: "Average Rating"
                    name: "rating"
                    widget: "number"
                    value_type: "float"
                    min: 1.0
                    max: 5.0
                    step: 0.1

          # ── Reviews list ──────────────────────────────────────────
          - label: "💬  Reviews"
            name: "reviews"
            widget: "list"
            collapsed: false
            add_to_top: true
            summary: "⭐{{fields.rating}}  {{fields.name}}  |  {{fields.destination}}  |  {{fields.platform}}  |  {{fields.date}}"
            hint: >
              Click «Add» to add a new review at the top.
              Each entry becomes one review card on the Success Stories page.
            fields:

              - label: "Review ID (unique — format: rev-013, rev-014 …)"
                name: "id"
                widget: "string"
                hint: "⚠️ Never change after saving."

              - label: "Reviewer Full Name"
                name: "name"
                widget: "string"
                hint: "E.g. «Sarah and James Thompson»."

              - label: "Reviewer Title / Job (optional)"
                name: "title"
                widget: "string"
                required: false
                hint: "Only for notable guests. E.g. «Ambassador of Sri Lanka to Indonesia». Leave blank otherwise."

              - label: "Reviewer Location"
                name: "location"
                widget: "string"
                hint: "E.g. «United Kingdom», «Sydney, Australia»."

              - label: "Review Date"
                name: "date"
                widget: "datetime"
                format: "YYYY-MM-DD"
                time_format: false

              - label: "Star Rating"
                name: "rating"
                widget: "select"
                default: "5"
                options: ["1", "2", "3", "4", "5"]

              - label: "Platform (⚠️ value must be lowercase)"
                name: "platform"
                widget: "select"
                hint: "The value saved is lowercase — this powers the filter on reviews.html."
                options:
                  - label: "TripAdvisor"
                    value: "tripadvisor"
                  - label: "Google"
                    value: "google"
                  - label: "Facebook"
                    value: "facebook"

              - label: "Destination"
                name: "destination"
                widget: "select"
                hint: "Used for the destination filter on the Success Stories page."
                options:
                  - "Sri Lanka"
                  - "Maldives"
                  - "Vietnam"
                  - "Cambodia"
                  - "Indonesia"
                  - "Dubai"
                  - "Singapore"
                  - "Malaysia"
                  - "Thailand"
                  - "Singapore and Malaysia"

              - label: "Linked Package ID (e.g. pkg-007)"
                name: "tourId"
                widget: "string"
                hint: >
                  Must match a package ID exactly. Creates a «View Tour» button.
                  Use empty string if no specific package applies.

              - label: "Tour Title"
                name: "tourTitle"
                widget: "string"
                hint: "Copy the tour title from the package. Shown as a label on the review card."

              - label: "Review Text (full review)"
                name: "text"
                widget: "text"
                hint: "Reviews over ~200 characters get a «See More» expand button automatically."

              - label: "Avatar Background Colour"
                name: "avatarColor"
                widget: "color"
                default: "#219a00"
                hint: "Background of the reviewer's initials circle. Use a distinct colour per reviewer."

              - label: "Trip Photos (optional — up to 6)"
                name: "images"
                widget: "list"
                allow_add: true
                collapsed: true
                summary: "📷  Photo {{index}}"
                hint: "Upload photos from this customer's trip. Leave empty if none."
                field:
                  label: "Photo"
                  name: "url"
                  widget: "image"

              - label: "⭐  Featured Review?"
                name: "featured"
                widget: "boolean"
                default: false
                hint: >
                  Featured reviews show in the highlighted strip at the top
                  of the Success Stories page. Keep to 4–5 at a time.

              - label: "AEON Expert who managed this booking"
                name: "expert"
                widget: "select"
                options:
                  - "Chathurika"
                  - "Priyanga"
                  - "Nimal"
                  - "Shalini"
                  - "Rohan"
                  - "Amara"


  # ════════════════════════════════════════════════════════════════════
  #  3.  ⚙️  SITE SETTINGS
  #      File: public/data/site.json
  # ════════════════════════════════════════════════════════════════════
  - name: "site"
    label: "⚙️  Site Settings"
    description: "Global company details, contact info and policy text used across all pages."
    format: "json"
    files:

      - name: "site_settings"
        label: "⚙️  Global Site Settings  (public/data/site.json)"
        file: "public/data/site.json"
        fields:

          - label: "Company Name"
            name: "companyName"
            widget: "string"

          - label: "Tagline"
            name: "tagline"
            widget: "string"

          - label: "Contact Details"
            name: "contact"
            widget: "object"
            collapsed: false
            fields:
              - label: "Primary Email"
                name: "email"
                widget: "string"
              - label: "Office Phone"
                name: "phone"
                widget: "string"
              - label: "WhatsApp Number (with country code, e.g. +94771234567)"
                name: "whatsapp"
                widget: "string"
                required: false
              - label: "Office Address"
                name: "address"
                widget: "string"
                required: false

          - label: "Unique Selling Proposition"
            name: "usp"
            widget: "text"

          - label: "Response Time Goal (hours, e.g. 24)"
            name: "responseTimeGoalHours"
            widget: "string"

          - label: "Privacy Policy"
            name: "privacyPolicy"
            widget: "text"

          - label: "Green / Sustainability Promise (optional)"
            name: "greenPromise"
            widget: "text"
            required: false