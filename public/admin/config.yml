backend:
  name: github
  repo: vishwa-aloka-16/aeon-travels  # Replace with your GitHub username and repo name

media_folder: "public/assets"  # Folder where your images will be stored
public_folder: "/assets"  # URL path for media

collections:
  - name: "pages"
    label: "Pages"
    folder: "public"  # Path to where your HTML content is located
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Content", name: "content", widget: "text" }

  - name: "reviews"
    label: "Reviews"
    folder: "content/data"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Review Title", name: "title", widget: "string" }
      - { label: "Review Content", name: "content", widget: "text" }
