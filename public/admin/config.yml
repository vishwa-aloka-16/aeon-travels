backend:
  name: github
  repo: vishwa-aloka-16/aeon-travels
  branch: main

media_folder: "public/assets/images"
public_folder: "/assets/images"

collections:

  - name: "packages"
    label: "Tour Packages"
    file: "content/data/packages.json"
    format: "json"
    fields:
      - label: "Sections"
        name: "sections"
        widget: "list"
        fields:

          - {label: "Section ID", name: "id", widget: "string"}
          - {label: "Label Bold", name: "labelBold", widget: "string"}
          - {label: "Label Light", name: "labelLight", widget: "string"}

          - label: "Packages"
            name: "packages"
            widget: "list"
            fields:

              - {label: "ID", name: "id", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Destination", name: "destination", widget: "string"}
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Price", name: "startingFrom", widget: "string"}
              - {label: "Duration", name: "duration", widget: "string"}
              - {label: "Cities", name: "cities", widget: "string"}
              - {label: "Summary", name: "summary", widget: "text"}

  - name: "reviews"
    label: "Reviews"
    file: "content/data/reviews.json"
    format: "json"
    fields:

      - label: "Reviews"
        name: "reviews"
        widget: "list"
        fields:

          - {label: "ID", name: "id", widget: "string"}
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Location", name: "location", widget: "string"}
          - {label: "Date", name: "date", widget: "datetime"}
          - {label: "Rating", name: "rating", widget: "number"}
          - {label: "Platform", name: "platform", widget: "string"}
          - {label: "Tour ID", name: "tourId", widget: "string"}
          - {label: "Tour Title", name: "tourTitle", widget: "string"}
          - {label: "Text", name: "text", widget: "text"}